<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MercedesService — автосервис</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: Inter, sans-serif;
    margin: 0;
    background: #f5f7fa;
}

/* HEADER */
.header {
    background: #0a0a1a;
    color: #fff;
    padding: 15px;
    text-align: center;
}

/* HERO */
.hero {
    padding: 60px 20px;
    text-align: center;
    background: linear-gradient(135deg,#0a0a1a,#1a1a3e);
    color: white;
}

.hero img {
    max-width: 400px;
    border-radius: 15px;
    margin-top: 20px;
}

/* SERVICES */
.section {
    padding: 60px 20px;
}

.services {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
}

.card i {
    font-size: 30px;
    color: #d4af37;
}



/* CONTACT */
form input, form textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    background: #0a0a1a;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<header class="header">
<h1>MercedesService</h1>
<p>Профессиональный сервис Mercedes</p>
</header>

<section class="hero">
<h2>Ремонт и обслуживание Mercedes</h2>
<p>Качественно. Быстро. С гарантией.</p>

<img src="https://cdn.pixabay.com/photo/2019/04/19/09/11/mercedes-benz-4137485_1280.jpg">
</section>

<section class="section">
<h2>Наши услуги</h2>

<div class="services">
<div class="card">
<i class="fas fa-microchip"></i>
<p>Диагностика</p>
</div>

<div class="card">
<i class="fas fa-cogs"></i>
<p>Ремонт двигателя</p>
</div>

<div class="card">
<i class="fas fa-car-side"></i>
<p>Ходовая часть</p>
</div>

<div class="card">
<i class="fas fa-bolt"></i>
<p>Электрика</p>
</div>
</div>
</section>

<section class="section">
<h2>Автомобили Mercedes</h2>

<div class="gallery">
<img src="https://cdn.pixabay.com/photo/2018/05/17/21/49/mercedes-3402715_1280.jpg">
<img src="https://cdn.pixabay.com/photo/2016/11/29/09/08/auto-1868726_1280.jpg">
<img src="https://cdn.pixabay.com/photo/2019/01/27/20/36/mercedes-3958192_1280.jpg">
<img src="https://cdn.pixabay.com/photo/2017/03/27/14/56/auto-2179220_1280.jpg">
</div>
</section>

<section class="section">
<h2>Связаться с нами</h2>

<form>
<input type="text" placeholder="Имя">
<input type="tel" placeholder="Телефон">
<textarea placeholder="Комментарий"></textarea>
<button>Отправить</button>
</form>
</section>

<footer class="footer">
<p>© 2026 MercedesService</p>
</footer>

</body>
</html>
